version: "3.9"

services:
  tribemind:
    build: .
    ports:
      - "80:80"
      - "8501:8501"
      - "8000:8000"
    env_file:
      - .env
    environment:
      - TRIBE_BACKEND_URL=http://127.0.0.1:8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
